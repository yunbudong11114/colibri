[model]
provider = "openai_compatible"
base_url = "https://api.openai.com/v1"
model = "gpt-5.5"
api_key = ""
timeout_seconds = 60
max_output_tokens = 8192

[session]
max_tool_rounds = 24
recent_message_limit = 80
compact_trigger_chars = 64000
model_compact = true

[web_search]
engine = "baidu"
api_key = ""
endpoint = "https://qianfan.baidubce.com/v2/ai_search/web_search"
max_results = 10
timeout_seconds = 10
