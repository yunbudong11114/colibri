[model]
provider = "openai_compatible"
base_url = "https://api.openai.com/v1"
model = "gpt-4.1-mini"
api_key = ""
timeout_seconds = 60
max_output_tokens = 16384

[session]
max_tool_rounds = 32
recent_message_limit = 96
compact_trigger_chars = 24000
summary_max_chars = 24000
model_compact = true
idle_exit_enabled = false
idle_exit_seconds = 300
transcript = true

[tools]
enabled = ["shell", "files", "web", "memory", "skills", "mcp"]
default_permission = "allow_read_confirm_write"
max_result_chars = 32000
max_shell_seconds = 30

[shell]
deny = ["rm", "shutdown", "reboot", "mkfs", "dd", "sudo"]

[files]
roots = ["~/.colibri", "/tmp"]

[skills]
dirs = ["~/.colibri/skills"]
max_loaded = 3
max_instruction_chars = 8000

[console]
status = true

[memory]
enabled = true
root = "~/.colibri/memory"
max_search_results = 5
max_recall_topics = 3
max_recall_chars = 6000

[web_search]
engine = "baidu"
api_key = ""
endpoint = "https://qianfan.baidubce.com/v2/ai_search/web_search"
max_results = 10
timeout_seconds = 10

[gateway]
enabled_channels = ["weixin"]
max_sessions = 4
session_idle_seconds = 600

[channels.weixin]
enabled = false
token = ""
base_url = "https://ilinkai.weixin.qq.com/"
allow_from = []
poll_timeout_seconds = 35
auth_timeout_seconds = 300

[mcp]
enabled = false
startup = "lazy"
max_active_servers = 1
