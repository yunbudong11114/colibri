[model]
# 模型提供方；fake 用于本地测试，openai_compatible 用于真实 OpenAI-compatible API。
provider = "openai_compatible"
# 模型 API 的基础地址，结尾通常是 /v1。
base_url = "https://api.openai.com/v1"
# 实际请求的模型名称。
model = "gpt-4.1-mini"
# 模型 API Key；为空时默认读取 COLIBRI_API_KEY 环境变量。
api_key = ""
# 单次模型请求超时时间，单位秒。
timeout_seconds = 60
# 临时网络、超时、限流和 5xx 错误的最大重试次数。
max_retries = 2
# 首次重试退避毫秒数；后续按 2 倍增长。
retry_backoff_ms = 500
# 单次模型回复的最大输出 token 数。
max_output_tokens = 16384
# 模型输入上下文 token 上限；达到 80% 时触发历史压缩。
input_context_tokens = 48000

[vision]
# 视觉模型名称；为空时复用 [model].model。
model = ""
# 视觉模型 API 地址；为空时复用 [model].base_url。
base_url = ""
# 视觉模型 API Key；为空时复用 [model].api_key 或 COLIBRI_API_KEY。
api_key = ""
# 视觉模型请求超时时间，单位秒。
timeout_seconds = 60
# 单张图片发送给模型的最大字节数。
max_image_bytes = 4194304

[session]
# 单次用户请求内允许的最大工具调用轮数。
max_tool_rounds = 32
# session 内消息数达到该值时触发历史压缩。
trigger_message_limit = 96
# 压缩后保留的最近消息条数。
recent_message_limit = 12
# 滚动摘要最多保留的字符数。
summary_max_chars = 12000
# 是否优先调用模型生成历史摘要；失败时会自动回退到本地摘要。
model_compact = true
# REPL 空闲自动退出是否启用。
idle_exit_enabled = false
# REPL 空闲自动退出等待秒数。
idle_exit_seconds = 300
# 是否写入 transcript JSONL 日志。
transcript = true
# 新建 session 首次对话前是否从共享 transcript 恢复近期完整问答。
restore_transcript = true
# 从 transcript 恢复的最大消息条数；按完整问答轮次截取。
restore_message_limit = 24
# 从 transcript 恢复内容的最大字符数；按完整问答轮次截取。
restore_char_limit = 24000
# 启动恢复最多扫描的 transcript 尾部字节数。
restore_scan_bytes = 2097152
# transcript 文件保留天数；设为 0 时不按时间清理。
transcript_retention_days = 30
# transcript 目录允许占用的总字节数；设为 0 时不按容量清理。
transcript_max_total_bytes = 134217728

[tools]
# 启用的工具类别。
enabled = ["shell", "files", "web", "image", "memory", "skills"]
# 默认权限策略；当前值表示只读默认允许、写入/执行需要确认。
default_permission = "allow_read_confirm_write"
# 单次工具结果写入上下文前的最大字符数。
max_result_chars = 32000
# shell.run 单次命令超时时间，单位秒。
max_shell_seconds = 30

[shell]
# 永远拒绝执行的 shell 可执行名。
deny = ["rm", "shutdown", "reboot", "mkfs", "dd", "sudo"]

[files]
# 默认允许文件工具访问的根目录；启动目录也会被默认允许，生成产物优先放入 workspace。
roots = ["~/.colibri/workspace", "/tmp/colibri"]

[skills]
# 本地 skill 目录（仅支持单一目录）。
dir = "~/.colibri/skills"
# 注入 prompt 的 skill catalog 最多条目数（含 builtin）。
max_catalog = 32
# skill catalog 系统消息最大字符数。
max_catalog_chars = 4000
# skill.read 返回的单个 skill 正文最大字符数。
max_instruction_chars = 8000

[console]
# 是否在 stderr 输出 [colibri] 状态行。
status = true
# 是否对本地 ask/repl 最终回答做小屏友好去噪（去粗体/代码标记、表格改成普通行）。
# 不影响会话历史、transcript 和微信 gateway 发出的消息。
plain_answer = true

[memory]
# 是否启用长期记忆。
enabled = true
# 长期记忆根目录。
root = "~/.colibri/memory"
# memory.search 工具最多返回的搜索结果数。
max_search_results = 5
# SOUL.md、USER.md 和 MEMORY.md 作为 always-on 记忆注入上下文前的总字符数。
max_recall_chars = 6000

[web_search]
# Web 搜索引擎名称。
engine = "baidu"
# Web 搜索 API Key。
api_key = ""
# Web 搜索 API endpoint。
endpoint = "https://qianfan.baidubce.com/v2/ai_search/web_search"
# 单次搜索默认返回结果数。
max_results = 10
# Web 搜索请求超时时间，单位秒。
timeout_seconds = 10

[gateway]
# gateway 启用的 channel 列表。
enabled_channels = ["weixin"]
# 同时保留在内存中的 channel session 数量上限。
max_sessions = 4
# channel session 空闲驱逐时间，单位秒。
session_idle_seconds = 600
# 入站待处理消息全局上限（所有 session 合计）。
max_pending_inbound = 8
# 同时执行的 agent submit 上限；小设备建议保持 1。
max_concurrent_turns = 1

[channels.weixin]
# 是否启用微信 channel。
enabled = false
# 微信 iLink bot token，由 colibri auth weixin 写入。
token = ""
# 微信 iLink API 基础地址。
base_url = "https://ilinkai.weixin.qq.com/"
# 允许访问的微信用户 ID 列表；空列表表示不限制。
allow_from = []
# 微信长轮询请求超时时间，单位秒。
poll_timeout_seconds = 35
# 微信扫码授权等待时间，单位秒。
auth_timeout_seconds = 300
